<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Symbol Cipher Translator</title>

<style>
body {
    background: #0f0f0f;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding-top: 60px;
}

textarea {
    width: 80%;
    height: 80px;
    margin: 10px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    padding: 10px;
}

button {
    width: 200px;
    height: 50px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #ff3b3b;
    color: white;
    margin-top: 10px;
}

button:hover {
    background: #ff1f1f;
}
</style>
</head>

<body>

<h1>Hup Translator</h1>

<textarea id="input" placeholder="Type English or symbols..."></textarea>
<br>

<button onclick="translateText()">Translate</button>

<br>

<textarea id="output" placeholder="Output will appear here..."></textarea>

<script>
// ENCODE MAP
const encodeMap = {
    a:"✌", b:"👌", c:"👍", d:"👎", e:"☜",
    f:"☞", g:"☝", h:"☟", i:"✋", j:"☺",
    k:"😐", l:"☹", m:"💣", n:"☠", o:"⚐",
    p:"🏱", q:"✈", r:"☼", s:"💧", t:"❄",
    u:"🕆", v:"✞", w:"🕈", x:"✠", y:"✡", z:"☪",
    " ":" "
};

// DECODE MAP
const decodeMap = {};
for (let key in encodeMap) {
    decodeMap[encodeMap[key]] = key;
}

// encode function
function encode(text) {
    text = text.toLowerCase();
    let result = "";

    for (let char of text) {
        result += encodeMap[char] || char;
    }

    return result;
}

// decode function (safe unicode handling)
function decode(text) {
    let result = "";

    for (let char of text) {
        if (decodeMap[char]) {
            result += decodeMap[char];
        } else {
            result += char;
        }
    }

    return result;
}

// auto detect + translate
function translateText() {
    let input = document.getElementById("input").value;

    let isEnglish = /[a-zA-Z]/.test(input);

    if (isEnglish) {
        document.getElementById("output").value = encode(input);
    } else {
        document.getElementById("output").value = decode(input);
    }
}
</script>

</body>
</html>
